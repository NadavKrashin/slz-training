name: Deploy — Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    # GitHub Environment "production" can require manual approval.
    # Configure it in: GitHub repo → Settings → Environments → production → Required reviewers
    environment: production

    env:
      NEXT_PUBLIC_USE_EMULATORS: false
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.PROD_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${{ secrets.PROD_FIREBASE_VAPID_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Production
        run: npx firebase-tools deploy --project production --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
